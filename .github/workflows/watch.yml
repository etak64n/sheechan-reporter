name: watch

on:
  schedule:
    # Hourly at :07 (a few minutes off the hour to avoid GitHub's
    # top-of-the-hour scheduling congestion). Cheap to run often: no-news runs
    # skip the LLM steps (feed check only), the repo is public so Actions
    # minutes are free, and hourly drains bursts faster than the per-run cap
    # (MAX_NEW_PER_RUN) would allow on a 6-hour cadence.
    - cron: "7 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write # state/articles のコミット用
  id-token: write # ブログ入稿 API の OIDC 認証用

concurrency:
  group: watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # ① 新着検出。LLM 不使用なので、新着ゼロの回はサブスク枠を消費しない
      - name: Detect new articles
        id: diff
        run: python3 scripts/check_feeds.py

      # ② Claude Code で紹介記事を生成(setup-token = サブスク枠、API 課金なし)
      # 1 セッションに大量の記事を任せると途中で終えてしまうことがあるため、
      # 同じステップを 3 回直列に実行する。各回は outbox/ に無いエントリだけを
      # 処理するので自然に続きから再開し、残りが無い回は即終了する
      - name: Generate articles (1/3)
        if: steps.diff.outputs.has_new == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Use the workflow's own token instead of the Claude GitHub App
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            work/new_articles.json(個別記事)と work/digest_items.json(ダイジェスト対象)に新着があります。
            prompts/generate.md の指示に厳密に従い、記事 JSON を outbox/ に作成してください。
          # WebSearch and curl are fallbacks for pages that block WebFetch
          # (bot protection / JS-rendered pages; e.g. openai.com)
          claude_args: "--allowedTools WebFetch,WebSearch,Bash(curl:*),Read,Write,Glob,Grep --max-turns 100"

      - name: Generate articles (2/3)
        if: steps.diff.outputs.has_new == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            work/new_articles.json(個別記事)と work/digest_items.json(ダイジェスト対象)に新着があります。
            prompts/generate.md の指示に厳密に従い、記事 JSON を outbox/ に作成してください。
          claude_args: "--allowedTools WebFetch,WebSearch,Bash(curl:*),Read,Write,Glob,Grep --max-turns 100"

      - name: Generate articles (3/3)
        if: steps.diff.outputs.has_new == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            work/new_articles.json(個別記事)と work/digest_items.json(ダイジェスト対象)に新着があります。
            prompts/generate.md の指示に厳密に従い、記事 JSON を outbox/ に作成してください。
          claude_args: "--allowedTools WebFetch,WebSearch,Bash(curl:*),Read,Write,Glob,Grep --max-turns 100"

      # ③ ブログ入稿 API へ POST(OIDC トークンはこのステップ内で発行)
      - name: Post to blog
        if: steps.diff.outputs.has_new == 'true'
        env:
          BLOG_API_URL: https://blog.shiichan.etak64n.dev
        run: python3 scripts/post_articles.py

      # ④ 既読状態とアーカイブをコミット(投稿が部分的に失敗しても成功分は永続化する)
      - name: Persist state
        if: ${{ !cancelled() }}
        run: |
          git config user.name "shiichan-reporter[bot]"
          git config user.email "shiichan-reporter@users.noreply.github.com"
          git add state articles outbox
          git diff --cached --quiet && { echo "nothing to persist"; exit 0; }
          git commit -m "publish: $(date -u '+%Y-%m-%d %H:%M') UTC"
          # Another push (a manual run, or a concurrent job) may have advanced
          # main between our checkout and now. Rebase onto it and retry rather
          # than failing. seen.json / archive files are per-item, so rebasing
          # our commit on top merges cleanly; a rare true conflict aborts and
          # is retried on the next scheduled run.
          for attempt in 1 2 3 4 5; do
            if git push; then echo "pushed (attempt $attempt)"; exit 0; fi
            echo "push rejected (attempt $attempt) — main advanced; rebasing"
            git pull --rebase --no-edit origin main \
              || { git rebase --abort 2>/dev/null || true; echo "rebase conflict; retrying next run" >&2; exit 1; }
            sleep $((RANDOM % 5 + 1))
          done
          echo "push still failing after retries" >&2
          exit 1
